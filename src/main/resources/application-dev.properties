# Local development profile — safe defaults only; never use in production.

# Atlas URI from cloudshareapi/.env; fallback to local Mongo for offline dev.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cloudshare}
# spring.data.mongodb.uri=mongodb://localhost:27017/cloudshare

# Dev-only JWT fallback (>= 64 chars). Override with JWT_SECRET in .env for team consistency.
jwt.secret=${JWT_SECRET:dev-only-local-jwt-secret-must-be-at-least-64-characters-long-for-hs256!!}

app.auth.dev-expose-tokens=${DEV_EXPOSE_TOKENS:true}
app.auth.require-email-verification=${REQUIRE_EMAIL_VERIFICATION:false}
app.security.expose-error-details=${EXPOSE_ERROR_DETAILS:true}

server.error.include-message=always
server.error.include-stacktrace=on_param

logging.level.in.bushansirgur.cloudshareapi=DEBUG

# Payments optional locally — leave unset unless testing checkout
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
