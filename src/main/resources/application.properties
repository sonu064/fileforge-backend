# Active profile: dev (local) | prod (Render/production)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.servlet.context-path=/api/v1.0

# Indexes created by MongoIndexConfig after startup (avoids eager TLS connect during mongoTemplate init).
spring.data.mongodb.auto-index-creation=false

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===== MongoDB — loaded from MONGODB_URI in cloudshareapi/.env via spring-dotenv =====
spring.data.mongodb.uri=${MONGODB_URI:}

# ===== Custom JWT authentication =====
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:2592000000}

# Public base URL of the frontend (verification / reset links in emails).
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.auth.require-email-verification=${REQUIRE_EMAIL_VERIFICATION:false}
app.auth.dev-expose-tokens=${DEV_EXPOSE_TOKENS:false}

# CORS — comma-separated origins allowed to call the API.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173}

# When false, generic error messages are returned to clients (production default).
app.security.expose-error-details=${EXPOSE_ERROR_DETAILS:false}

# Local upload directory (must match between upload + streaming).
app.upload-dir=${UPLOAD_DIR:upload}

# ===== Mail (optional) =====
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:CloudShare <no-reply@cloudshare.local>}

# ===== File upload =====
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# ===== Razorpay (optional in dev — required in prod via ProductionStartupValidator) =====
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
