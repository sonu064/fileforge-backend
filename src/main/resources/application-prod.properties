# Production profile — all secrets MUST be supplied via environment variables.

app.auth.dev-expose-tokens=false
app.auth.require-email-verification=true
app.security.expose-error-details=false

server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.error.include-exception=false

logging.level.root=WARN
logging.level.in.bushansirgur.cloudshareapi=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
